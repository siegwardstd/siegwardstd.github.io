<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#141110"/>
  <!-- Monitor frame -->
  <rect x="3" y="5" width="26" height="17" rx="3" fill="#1a1614" stroke="#e85030" stroke-width="1.5"/>
  <!-- Title bar divider -->
  <line x1="3.75" y1="10.5" x2="28.25" y2="10.5" stroke="#e85030" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Ball -->
  <circle cx="16" cy="16.5" r="5" fill="#e85030"/>
  <!-- Ball gloss highlight -->
  <circle cx="14.2" cy="14.6" r="1.6" fill="white" fill-opacity="0.22"/>
</svg>
